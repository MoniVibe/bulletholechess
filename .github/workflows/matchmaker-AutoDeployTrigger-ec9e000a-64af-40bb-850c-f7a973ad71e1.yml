name: Trigger auto deployment for matchmaker

on:
  push:
    branches:
      - main
    paths:
      - "multiplayer_node_server/**"
      - ".github/workflows/matchmaker-AutoDeployTrigger-ec9e000a-64af-40bb-850c-f7a973ad71e1.yml"
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.MATCHMAKER_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.MATCHMAKER_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.MATCHMAKER_AZURE_SUBSCRIPTION_ID }}

      - name: Deploy source to Azure Container Apps
        uses: azure/CLI@v2
        env:
          MATCHMAKER_ACR_NAME: ${{ vars.MATCHMAKER_ACR_NAME }}
          MATCHMAKER_REGISTRY_USERNAME: ${{ secrets.MATCHMAKER_REGISTRY_USERNAME }}
          MATCHMAKER_REGISTRY_PASSWORD: ${{ secrets.MATCHMAKER_REGISTRY_PASSWORD }}
          MATCHMAKER_MIN_REPLICAS: ${{ vars.MATCHMAKER_MIN_REPLICAS }}
          MATCHMAKER_MAX_REPLICAS: ${{ vars.MATCHMAKER_MAX_REPLICAS }}
          MATCH_TTL_MS: ${{ vars.MATCH_TTL_MS }}
        with:
          inlineScript: |
            set -euo pipefail

            az extension add --name containerapp --upgrade --allow-preview true

            # Required resource providers for `az containerapp up --source`.
            required_providers=(
              "Microsoft.App"
              "Microsoft.OperationalInsights"
              "Microsoft.ContainerRegistry"
            )

            for ns in "${required_providers[@]}"; do
              state="$(az provider show --namespace "$ns" --query registrationState -o tsv || true)"
              if [ "$state" != "Registered" ]; then
                echo "Registering provider: $ns (current: ${state:-unknown})"
                if ! az provider register --namespace "$ns" --wait; then
                  echo "Failed to register provider $ns."
                  echo "Grant this identity permission to register providers (Contributor/Owner on subscription),"
                  echo "or register it once from Azure Portal: Subscriptions > <your-subscription> > Resource providers."
                  exit 1
                fi
              fi
            done

            acr_name="${MATCHMAKER_ACR_NAME:-}"
            if [ -z "$acr_name" ]; then
              acr_name="$(az acr list --resource-group chess --query "[0].name" -o tsv)"
            fi
            if [ -z "$acr_name" ]; then
              echo "No ACR found in resource group 'chess'. Set MATCHMAKER_ACR_NAME or create an ACR."
              exit 1
            fi

            login_server="$(az acr show --name "$acr_name" --resource-group chess --query loginServer -o tsv)"
            image_tag="${GITHUB_SHA}"
            image_ref="${login_server}/matchmaker:${image_tag}"

            az acr build \
              --registry "$acr_name" \
              --resource-group chess \
              --image "matchmaker:${image_tag}" \
              ./multiplayer_node_server

            min_replicas="${MATCHMAKER_MIN_REPLICAS:-0}"
            max_replicas="${MATCHMAKER_MAX_REPLICAS:-1}"
            has_ttl="false"
            if [ -n "${MATCH_TTL_MS:-}" ]; then
              has_ttl="true"
            fi

            has_registry_creds="false"
            if [ -n "${MATCHMAKER_REGISTRY_USERNAME:-}" ] && [ -n "${MATCHMAKER_REGISTRY_PASSWORD:-}" ]; then
              has_registry_creds="true"
            else
              echo "MATCHMAKER_REGISTRY_USERNAME/PASSWORD not set. Container App must already have pull access to $login_server."
            fi

            if az containerapp show --name matchmaker --resource-group chess >/dev/null 2>&1; then
              if [ "$has_registry_creds" = "true" ]; then
                az containerapp registry set \
                  --name matchmaker \
                  --resource-group chess \
                  --server "$login_server" \
                  --username "$MATCHMAKER_REGISTRY_USERNAME" \
                  --password "$MATCHMAKER_REGISTRY_PASSWORD"
              fi

              if [ "$has_ttl" = "true" ]; then
                az containerapp update \
                  --name matchmaker \
                  --resource-group chess \
                  --image "$image_ref" \
                  --min-replicas "$min_replicas" \
                  --max-replicas "$max_replicas" \
                  --set-env-vars "MATCH_TTL_MS=${MATCH_TTL_MS}"
              else
                az containerapp update \
                  --name matchmaker \
                  --resource-group chess \
                  --image "$image_ref" \
                  --min-replicas "$min_replicas" \
                  --max-replicas "$max_replicas"
              fi
            else
              if [ "$has_ttl" = "true" ]; then
                if [ "$has_registry_creds" = "true" ]; then
                  az containerapp create \
                    --name matchmaker \
                    --resource-group chess \
                    --environment managedEnvironment-chess-a634 \
                    --image "$image_ref" \
                    --ingress external \
                    --target-port 8080 \
                    --min-replicas "$min_replicas" \
                    --max-replicas "$max_replicas" \
                    --env-vars "MATCH_TTL_MS=${MATCH_TTL_MS}" \
                    --registry-server "$login_server" \
                    --registry-username "$MATCHMAKER_REGISTRY_USERNAME" \
                    --registry-password "$MATCHMAKER_REGISTRY_PASSWORD"
                else
                  az containerapp create \
                    --name matchmaker \
                    --resource-group chess \
                    --environment managedEnvironment-chess-a634 \
                    --image "$image_ref" \
                    --ingress external \
                    --target-port 8080 \
                    --min-replicas "$min_replicas" \
                    --max-replicas "$max_replicas" \
                    --env-vars "MATCH_TTL_MS=${MATCH_TTL_MS}"
                fi
              else
                if [ "$has_registry_creds" = "true" ]; then
                  az containerapp create \
                    --name matchmaker \
                    --resource-group chess \
                    --environment managedEnvironment-chess-a634 \
                    --image "$image_ref" \
                    --ingress external \
                    --target-port 8080 \
                    --min-replicas "$min_replicas" \
                    --max-replicas "$max_replicas" \
                    --registry-server "$login_server" \
                    --registry-username "$MATCHMAKER_REGISTRY_USERNAME" \
                    --registry-password "$MATCHMAKER_REGISTRY_PASSWORD"
                else
                  az containerapp create \
                    --name matchmaker \
                    --resource-group chess \
                    --environment managedEnvironment-chess-a634 \
                    --image "$image_ref" \
                    --ingress external \
                    --target-port 8080 \
                    --min-replicas "$min_replicas" \
                    --max-replicas "$max_replicas"
                fi
              fi
            fi

  notify-discord:
    name: Notify Discord on failure
    runs-on: ubuntu-latest
    needs: [build-and-deploy]
    if: >-
      ${{
        always() &&
        secrets.DISCORD_CI_FAILURE_WEBHOOK != '' &&
        needs.build-and-deploy.result == 'failure'
      }}
    steps:
      - name: Send Discord failure notification
        uses: ./.github/actions/notify-discord-failure
        with:
          webhook_url: ${{ secrets.DISCORD_CI_FAILURE_WEBHOOK }}
          workflow_name: ${{ github.workflow }}
          run_number: ${{ github.run_number }}
          repository: ${{ github.repository }}
          ref_name: ${{ github.ref_name }}
          actor: ${{ github.actor }}
          sha: ${{ github.sha }}
          server_url: ${{ github.server_url }}
          run_id: ${{ github.run_id }}
          event_name: ${{ github.event_name }}
          failed_jobs_json: ${{ toJson(needs) }}



