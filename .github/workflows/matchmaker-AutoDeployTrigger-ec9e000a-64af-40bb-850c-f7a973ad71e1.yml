name: Trigger auto deployment for matchmaker

on:
  push:
    branches:
      - main
    paths:
      - "multiplayer_node_server/**"
      - ".github/workflows/matchmaker-AutoDeployTrigger-ec9e000a-64af-40bb-850c-f7a973ad71e1.yml"
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.MATCHMAKER_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.MATCHMAKER_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.MATCHMAKER_AZURE_SUBSCRIPTION_ID }}

      - name: Deploy source to Azure Container Apps
        uses: azure/CLI@v2
        env:
          MATCHMAKER_MIN_REPLICAS: ${{ vars.MATCHMAKER_MIN_REPLICAS }}
          MATCHMAKER_MAX_REPLICAS: ${{ vars.MATCHMAKER_MAX_REPLICAS }}
          MATCH_TTL_MS: ${{ vars.MATCH_TTL_MS }}
        with:
          inlineScript: |
            set -euo pipefail

            az extension add --name containerapp --upgrade --allow-preview true

            # Required resource providers for `az containerapp up --source`.
            required_providers=(
              "Microsoft.App"
              "Microsoft.OperationalInsights"
              "Microsoft.ContainerRegistry"
            )

            for ns in "${required_providers[@]}"; do
              state="$(az provider show --namespace "$ns" --query registrationState -o tsv || true)"
              if [ "$state" != "Registered" ]; then
                echo "Registering provider: $ns (current: ${state:-unknown})"
                if ! az provider register --namespace "$ns" --wait; then
                  echo "Failed to register provider $ns."
                  echo "Grant this identity permission to register providers (Contributor/Owner on subscription),"
                  echo "or register it once from Azure Portal: Subscriptions > <your-subscription> > Resource providers."
                  exit 1
                fi
              fi
            done

            az containerapp up \
              --name matchmaker \
              --resource-group chess \
              --environment managedEnvironment-chess-a634 \
              --source ./multiplayer_node_server \
              --ingress external \
              --target-port 8080

            min_replicas="${MATCHMAKER_MIN_REPLICAS:-0}"
            max_replicas="${MATCHMAKER_MAX_REPLICAS:-1}"

            if [ -n "${MATCH_TTL_MS:-}" ]; then
              az containerapp update \
                --name matchmaker \
                --resource-group chess \
                --min-replicas "$min_replicas" \
                --max-replicas "$max_replicas" \
                --set-env-vars "MATCH_TTL_MS=${MATCH_TTL_MS}"
            else
              az containerapp update \
                --name matchmaker \
                --resource-group chess \
                --min-replicas "$min_replicas" \
                --max-replicas "$max_replicas"
            fi


