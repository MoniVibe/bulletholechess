name: Bughunt Nightly

on:
  schedule:
    # Daily canary lane with tiny workload to preserve fast bug signal at low cost.
    - cron: "20 2 * * *"
  workflow_dispatch:
    inputs:
      run_profile:
        description: "Execution depth (canary keeps spend low; deep is explicit/manual)"
        required: false
        default: canary
        type: choice
        options:
          - canary
          - deep

concurrency:
  # Avoid overlapping nightly/dispatch runs of the same workflow/ref.
  group: ${{ github.workflow }}-${{ github.ref }}
  # Replace stale runs so overlaps do not multiply minute usage.
  cancel-in-progress: true

jobs:
  chess-local-soak:
    runs-on: ubuntu-latest
    timeout-minutes: 4
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        # Deep mode is opt-in via manual dispatch. Scheduled runs stay lightweight.
        batch: ${{ fromJson(github.event_name == 'schedule' && '[1]' || (github.event.inputs.run_profile == 'deep' && '[1,2,3,4,5]' || '[1,2]')) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Flutter and shared dependency auth
        uses: ./.github/actions/setup-flutter-shared-dependency
        with:
          pureflutter_repo_token: ${{ secrets.PUREFLUTTER_REPO_TOKEN }}
          flutter_cache: "true"
      - name: Cleanup tokenized Git auth
        if: always()
        uses: ./.github/actions/cleanup-tokenized-git-auth
      - name: Run local soak batch
        shell: bash
        env:
          RUN_ID: nightly-${{ github.run_id }}-local-b${{ matrix.batch }}
          BULLETHOLE_LOG_ROOT: ${{ github.workspace }}
          BULLETHOLE_BUGHUNT_RUN_ID: nightly-${{ github.run_id }}-local-b${{ matrix.batch }}
          LOCAL_SEEDS_PER_SOURCE_BATCH: ${{ github.event_name == 'schedule' && '1' || (github.event.inputs.run_profile == 'deep' && '5' || '2') }}
          LOCAL_SOURCE_BATCH_COUNT: ${{ github.event_name == 'schedule' && '1' || '2' }}
          LOCAL_DUEL_TIMEOUT: ${{ github.event_name == 'schedule' && '90s' || '4m' }}
        run: |
          set -euo pipefail
          first_source_batch=$(((${{ matrix.batch }} * 2) - 1))
          second_source_batch=$((first_source_batch + 1))
          source_batches=("$first_source_batch")
          if [ "$LOCAL_SOURCE_BATCH_COUNT" -gt 1 ]; then
            source_batches+=("$second_source_batch")
          fi
          for source_batch in "${source_batches[@]}"; do
            for i in $(seq 1 "$LOCAL_SEEDS_PER_SOURCE_BATCH"); do
              # Preserve legacy seed sets while reducing runner startup count.
              seed=$((3000 + (source_batch * 100) + i))
              timeout --signal=TERM --kill-after=20s "$LOCAL_DUEL_TIMEOUT" \
              flutter pub run tool/ai_duel.dart \
                --games=1 \
                --max-plies=260 \
                --seed="$seed" \
                --run-id="$RUN_ID" \
                --log-file="artifacts/bughunt/$RUN_ID/chess/ai/weird-$seed.jsonl" \
                --pgn-dir="artifacts/bughunt/$RUN_ID/chess/ai/pgn-$seed"
            done
          done

      - name: Gate local soak batch
        shell: bash
        env:
          RUN_ID: nightly-${{ github.run_id }}-local-b${{ matrix.batch }}
          LOCAL_SEEDS_PER_SOURCE_BATCH: ${{ github.event_name == 'schedule' && '1' || (github.event.inputs.run_profile == 'deep' && '5' || '2') }}
          LOCAL_SOURCE_BATCH_COUNT: ${{ github.event_name == 'schedule' && '1' || '2' }}
        run: |
          set -euo pipefail
          LOG="artifacts/bughunt/$RUN_ID/chess/ai/locala.jsonl"
          test -f "$LOG"
          completions=$(grep -c '"eventType":"session_complete"' "$LOG")
          expected=$((LOCAL_SOURCE_BATCH_COUNT * LOCAL_SEEDS_PER_SOURCE_BATCH))
          test "$completions" -ge "$expected"
          ! grep -q '"eventType":"crash"' "$LOG"
          ! grep -q '"eventType":"invariant_failure"' "$LOG"
          ! grep -q 'HOST_CLIENT_DESYNC' "$LOG"

      - name: Emit replay summaries (local soak)
        if: always()
        shell: bash
        env:
          RUN_ID: nightly-${{ github.run_id }}-local-b${{ matrix.batch }}
        run: flutter pub run tool/replay.dart --run-id="$RUN_ID"

      - name: Verify replay artifacts (local soak)
        if: always()
        shell: bash
        env:
          RUN_ID: nightly-${{ github.run_id }}-local-b${{ matrix.batch }}
        run: flutter pub run tool/verify_replay_artifacts.dart --run-id="$RUN_ID" --no-allow-empty

      - name: Upload local soak artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: chess-local-soak-batch-${{ matrix.batch }}
          path: artifacts/bughunt/nightly-${{ github.run_id }}-local-b${{ matrix.batch }}
          if-no-files-found: warn

  chess-online-soak:
    if: ${{ vars.BUGHUNT_BACKEND_URL != '' }}
    runs-on: self-hosted
    timeout-minutes: 25
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        # Deep mode is opt-in via manual dispatch. Scheduled runs stay lightweight.
        batch: ${{ fromJson(github.event_name == 'schedule' && '[1]' || (github.event.inputs.run_profile == 'deep' && '[1,2,3]' || '[1,2]')) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Flutter and shared dependency auth
        uses: ./.github/actions/setup-flutter-shared-dependency
        with:
          pureflutter_repo_token: ${{ secrets.PUREFLUTTER_REPO_TOKEN }}
          flutter_cache: "true"
      - name: Cleanup tokenized Git auth
        if: always()
        uses: ./.github/actions/cleanup-tokenized-git-auth
      - name: Run online soak batch
        shell: bash
        env:
          BACKEND_URL: ${{ vars.BUGHUNT_BACKEND_URL }}
          RUN_ID: nightly-${{ github.run_id }}-online-b${{ matrix.batch }}
          BULLETHOLE_LOG_ROOT: ${{ github.workspace }}
          BULLETHOLE_BUGHUNT_RUN_ID: nightly-${{ github.run_id }}-online-b${{ matrix.batch }}
          ONLINE_SEEDS_PER_SOURCE_BATCH: ${{ github.event_name == 'schedule' && '1' || (github.event.inputs.run_profile == 'deep' && '5' || '2') }}
        run: |
          set -euo pipefail
          OUT="artifacts/bughunt/$RUN_ID/chess/online"
          mkdir -p "$OUT"
          HOST_LOG="$OUT/host.jsonl"
          CLIENT_LOG="$OUT/client.jsonl"
          : > "$HOST_LOG"
          : > "$CLIENT_LOG"

          first_source_batch=$(((${{ matrix.batch }} * 2) - 1))
          second_source_batch=$((first_source_batch + 1))
          for source_batch in "$first_source_batch" "$second_source_batch"; do
            for i in $(seq 1 "$ONLINE_SEEDS_PER_SOURCE_BATCH"); do
              # Preserve legacy seed sets while reducing runner startup count.
              seed=$((4000 + (source_batch * 100) + i))
              seed_dir="$OUT/seed-$seed"
              mkdir -p "$seed_dir"

              timeout --signal=TERM --kill-after=20s 6m \
              flutter pub run tool/network_ai_duel_client.dart \
                --backend-url="$BACKEND_URL" \
                --name="ChessHost-$seed" \
                --cooldown-seconds=0 \
                --seed="$seed" \
                --role=host \
                --run-id="$RUN_ID" \
                --log-file="$seed_dir/host.session.jsonl" \
                >"$seed_dir/host.stdout.log" 2>"$seed_dir/host.stderr.log" &
              host_pid=$!

              ready=0
              for _ in $(seq 1 120); do
                if [ -f "$seed_dir/host.session.jsonl" ] && grep -q '"eventType":"session_joined"' "$seed_dir/host.session.jsonl"; then
                  ready=1
                  break
                fi
                sleep 0.5
              done
              if [ "$ready" -ne 1 ]; then
                kill "$host_pid" || true
                exit 1
              fi

              timeout --signal=TERM --kill-after=20s 6m \
              flutter pub run tool/network_ai_duel_client.dart \
                --backend-url="$BACKEND_URL" \
                --name="ChessClient-$seed" \
                --cooldown-seconds=0 \
                --seed="$seed" \
                --role=client \
                --run-id="$RUN_ID" \
                --log-file="$seed_dir/client.session.jsonl" \
                >"$seed_dir/client.stdout.log" 2>"$seed_dir/client.stderr.log" &
              client_pid=$!

              wait "$host_pid"
              wait "$client_pid"

              cat "$seed_dir/host.session.jsonl" >> "$HOST_LOG"
              cat "$seed_dir/client.session.jsonl" >> "$CLIENT_LOG"
            done
          done

      - name: Gate online soak batch
        shell: bash
        env:
          RUN_ID: nightly-${{ github.run_id }}-online-b${{ matrix.batch }}
          ONLINE_SEEDS_PER_SOURCE_BATCH: ${{ github.event_name == 'schedule' && '1' || (github.event.inputs.run_profile == 'deep' && '5' || '2') }}
        run: |
          set -euo pipefail
          HOST_LOG="artifacts/bughunt/$RUN_ID/chess/online/host.jsonl"
          CLIENT_LOG="artifacts/bughunt/$RUN_ID/chess/online/client.jsonl"
          test -f "$HOST_LOG"
          test -f "$CLIENT_LOG"
          host_completions=$(grep -c '"eventType":"session_complete"' "$HOST_LOG")
          client_completions=$(grep -c '"eventType":"session_complete"' "$CLIENT_LOG")
          expected=$((2 * ONLINE_SEEDS_PER_SOURCE_BATCH))
          test "$host_completions" -ge "$expected"
          test "$client_completions" -ge "$expected"
          ! grep -q '"eventType":"crash"' "$HOST_LOG"
          ! grep -q '"eventType":"crash"' "$CLIENT_LOG"
          ! grep -q '"eventType":"invariant_failure"' "$HOST_LOG"
          ! grep -q '"eventType":"invariant_failure"' "$CLIENT_LOG"
          ! grep -q 'HOST_CLIENT_DESYNC' "$HOST_LOG"
          ! grep -q 'HOST_CLIENT_DESYNC' "$CLIENT_LOG"

      - name: Emit replay summaries (online soak)
        if: always()
        shell: bash
        env:
          RUN_ID: nightly-${{ github.run_id }}-online-b${{ matrix.batch }}
        run: flutter pub run tool/replay.dart --run-id="$RUN_ID"

      - name: Verify replay artifacts (online soak)
        if: always()
        shell: bash
        env:
          RUN_ID: nightly-${{ github.run_id }}-online-b${{ matrix.batch }}
        run: flutter pub run tool/verify_replay_artifacts.dart --run-id="$RUN_ID" --no-allow-empty

      - name: Upload online soak artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: chess-online-soak-batch-${{ matrix.batch }}
          path: artifacts/bughunt/nightly-${{ github.run_id }}-online-b${{ matrix.batch }}
          if-no-files-found: warn

  notify-discord:
    name: Notify Discord on failure
    runs-on: ubuntu-latest
    env:
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_CI_FAILURE_WEBHOOK }}
    needs: [chess-local-soak, chess-online-soak]
    if: >-
      ${{
        always() &&
        (needs.chess-local-soak.result == 'failure' || needs.chess-online-soak.result == 'failure')
      }}
    steps:
      - name: Checkout repository for local action
        uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Send Discord failure notification
        if: ${{ env.DISCORD_WEBHOOK_URL != '' }}
        uses: ./.github/actions/notify-discord-failure
        with:
          webhook_url: ${{ env.DISCORD_WEBHOOK_URL }}
          workflow_name: ${{ github.workflow }}
          run_number: ${{ github.run_number }}
          repository: ${{ github.repository }}
          ref_name: ${{ github.ref_name }}
          actor: ${{ github.actor }}
          sha: ${{ github.sha }}
          server_url: ${{ github.server_url }}
          run_id: ${{ github.run_id }}
          event_name: ${{ github.event_name }}
          failed_jobs_json: ${{ toJson(needs) }}
