            exit 1
          fi
          git config --global url."https://x-access-token:${PUREFLUTTER_REPO_TOKEN}@github.com/".insteadOf "https://github.com/"

      - name: Install dependencies
        run: flutter pub get
      - name: Cleanup tokenized Git auth
        if: always()
        shell: bash
        run: |
          keys="$(git config --global --name-only --get-regexp '^url\.https://x-access-token:.*@github\.com/\.insteadof$' || true)"
          if [ -n "$keys" ]; then
            while IFS= read -r key; do
              [ -n "$key" ] && git config --global --unset-all "$key" || true
            done <<< "$keys"
          fi
      - name: Install xvfb
        run: sudo apt-get update && sudo apt-get install -y xvfb

      - name: Run integration perf lane under xvfb
        shell: bash
        run: xvfb-run -a flutter test integration_test/chess_bughunt_perf_test.dart

      - name: Upload integration perf artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: chess-integration-perf
          path: artifacts/bughunt/perf
          if-no-files-found: warn

  notify-discord:
    name: Notify Discord on failure
    runs-on: ubuntu-latest
    env:
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_CI_FAILURE_WEBHOOK }}
    needs: [chess-local-smoke, chess-online-smoke, chess-integration-smoke, chess-integration-perf]
    if: >-
      ${{
        always() &&
        (
          needs.chess-local-smoke.result == 'failure' ||
          needs.chess-online-smoke.result == 'failure' ||
          needs.chess-integration-smoke.result == 'failure' ||
          needs.chess-integration-perf.result == 'failure'
        )
      }}
    steps:
      - name: Checkout repository for local action
        uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Send Discord failure notification
        if: ${{ env.DISCORD_WEBHOOK_URL != '' }}
        uses: ./.github/actions/notify-discord-failure
        with:
          webhook_url: ${{ env.DISCORD_WEBHOOK_URL }}
          workflow_name: ${{ github.workflow }}
          run_number: ${{ github.run_number }}
          repository: ${{ github.repository }}
          ref_name: ${{ github.ref_name }}
          actor: ${{ github.actor }}
          sha: ${{ github.sha }}
          server_url: ${{ github.server_url }}
          run_id: ${{ github.run_id }}
          event_name: ${{ github.event_name }}
          failed_jobs_json: ${{ toJson(needs) }}
