name: Bughunt Smoke

on:
  pull_request:
    branches: [main]
    paths:
      - "lib/**"
      - "tool/**"
      - "test/**"
      - "integration_test/**"
      - "pubspec.yaml"
      - "pubspec.lock"
      - ".github/workflows/bughunt-smoke.yml"
  workflow_dispatch:

jobs:
  chess-local-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: true
      matrix:
        seed: [1101, 1102, 1103, 1104, 1105, 1106, 1107, 1108, 1109, 1110]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: false
      - name: Verify shared dependency pin
        run: dart tool/verify_shared_dependency.dart

      - name: Clear checkout GitHub auth header
        shell: bash
        run: |
          git config --local --unset-all http.https://github.com/.extraheader || true
          git config --global --unset-all http.https://github.com/.extraheader || true

      - name: Validate access to shared git dependency
        shell: bash
        env:
          PUREFLUTTER_REPO_TOKEN: ${{ secrets.PUREFLUTTER_REPO_TOKEN }}
        run: |
          set -euo pipefail
          if git ls-remote https://github.com/meshik/pureflutter.git HEAD >/dev/null 2>&1; then
            echo "Anonymous access to meshik/pureflutter is available."
            exit 0
          fi
          if [ -z "${PUREFLUTTER_REPO_TOKEN:-}" ]; then
            echo "::error::Anonymous git access failed and PUREFLUTTER_REPO_TOKEN is missing."
            echo "::error::Add PUREFLUTTER_REPO_TOKEN with read access to meshik/pureflutter."
            exit 1
          fi
          if ! git ls-remote "https://x-access-token:${PUREFLUTTER_REPO_TOKEN}@github.com/meshik/pureflutter.git" HEAD >/dev/null 2>&1; then
            echo "::error::PUREFLUTTER_REPO_TOKEN cannot read meshik/pureflutter."
            echo "::error::Use a token owned by an account that can open that repo, and ensure org SSO/token approval is completed if required."
            exit 1
          fi
          git config --global url."https://x-access-token:${PUREFLUTTER_REPO_TOKEN}@github.com/".insteadOf "https://github.com/"

      - name: Install dependencies
        run: flutter pub get
      - name: Cleanup tokenized Git auth
        if: always()
        shell: bash
        run: |
          keys="$(git config --global --name-only --get-regexp '^url\.https://x-access-token:.*@github\.com/\.insteadof$' || true)"
          if [ -n "$keys" ]; then
            while IFS= read -r key; do
              [ -n "$key" ] && git config --global --unset-all "$key" || true
            done <<< "$keys"
          fi
      - name: Run one local bughunt session
        shell: bash
        env:
          RUN_ID: smoke-${{ github.run_id }}-local-${{ matrix.seed }}
          BULLETHOLE_LOG_ROOT: ${{ github.workspace }}
          BULLETHOLE_BUGHUNT_RUN_ID: smoke-${{ github.run_id }}-local-${{ matrix.seed }}
        run: |
          set -euo pipefail
          flutter pub run tool/ai_duel.dart \
            --games=1 \
            --max-plies=240 \
            --seed=${{ matrix.seed }} \
            --run-id="$RUN_ID" \
            --log-file="artifacts/bughunt/$RUN_ID/chess/ai/weird-${{ matrix.seed }}.jsonl" \
            --pgn-dir="artifacts/bughunt/$RUN_ID/chess/ai/pgn-${{ matrix.seed }}"

      - name: Gate local log
        shell: bash
        env:
          RUN_ID: smoke-${{ github.run_id }}-local-${{ matrix.seed }}
        run: |
          set -euo pipefail
          LOG="artifacts/bughunt/$RUN_ID/chess/ai/locala.jsonl"
          test -f "$LOG"
          grep -q '"eventType":"session_complete"' "$LOG"
          ! grep -q '"eventType":"crash"' "$LOG"
          ! grep -q '"eventType":"invariant_failure"' "$LOG"
          ! grep -q 'HOST_CLIENT_DESYNC' "$LOG"

      - name: Emit replay summaries (local smoke)
        if: always()
        shell: bash
        env:
          RUN_ID: smoke-${{ github.run_id }}-local-${{ matrix.seed }}
        run: flutter pub run tool/replay.dart --run-id="$RUN_ID"

      - name: Verify replay artifacts (local smoke)
        if: always()
        shell: bash
        env:
          RUN_ID: smoke-${{ github.run_id }}-local-${{ matrix.seed }}
        run: flutter pub run tool/verify_replay_artifacts.dart --run-id="$RUN_ID" --no-allow-empty

      - name: Upload local smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: chess-local-smoke-${{ matrix.seed }}
          path: artifacts/bughunt/smoke-${{ github.run_id }}-local-${{ matrix.seed }}
          if-no-files-found: warn

  chess-online-smoke:
    if: ${{ vars.BUGHUNT_BACKEND_URL != '' }}
    runs-on: self-hosted
    timeout-minutes: 35
    strategy:
      fail-fast: true
      matrix:
        seed: [2101, 2102, 2103, 2104, 2105]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: false
      - name: Verify shared dependency pin
        run: dart tool/verify_shared_dependency.dart

      - name: Clear checkout GitHub auth header
        shell: bash
        run: |
          git config --local --unset-all http.https://github.com/.extraheader || true
          git config --global --unset-all http.https://github.com/.extraheader || true

      - name: Validate access to shared git dependency
        shell: bash
        env:
          PUREFLUTTER_REPO_TOKEN: ${{ secrets.PUREFLUTTER_REPO_TOKEN }}
        run: |
          set -euo pipefail
          if git ls-remote https://github.com/meshik/pureflutter.git HEAD >/dev/null 2>&1; then
            echo "Anonymous access to meshik/pureflutter is available."
            exit 0
          fi
          if [ -z "${PUREFLUTTER_REPO_TOKEN:-}" ]; then
            echo "::error::Anonymous git access failed and PUREFLUTTER_REPO_TOKEN is missing."
            echo "::error::Add PUREFLUTTER_REPO_TOKEN with read access to meshik/pureflutter."
            exit 1
          fi
          if ! git ls-remote "https://x-access-token:${PUREFLUTTER_REPO_TOKEN}@github.com/meshik/pureflutter.git" HEAD >/dev/null 2>&1; then
            echo "::error::PUREFLUTTER_REPO_TOKEN cannot read meshik/pureflutter."
            echo "::error::Use a token owned by an account that can open that repo, and ensure org SSO/token approval is completed if required."
            exit 1
          fi
          git config --global url."https://x-access-token:${PUREFLUTTER_REPO_TOKEN}@github.com/".insteadOf "https://github.com/"

      - name: Install dependencies
        run: flutter pub get
      - name: Cleanup tokenized Git auth
        if: always()
        shell: bash
        run: |
          keys="$(git config --global --name-only --get-regexp '^url\.https://x-access-token:.*@github\.com/\.insteadof$' || true)"
          if [ -n "$keys" ]; then
            while IFS= read -r key; do
              [ -n "$key" ] && git config --global --unset-all "$key" || true
            done <<< "$keys"
          fi
      - name: Run host/client online bughunt session
        shell: bash
        env:
          BACKEND_URL: ${{ vars.BUGHUNT_BACKEND_URL }}
          RUN_ID: smoke-${{ github.run_id }}-online-${{ matrix.seed }}
          BULLETHOLE_LOG_ROOT: ${{ github.workspace }}
          BULLETHOLE_BUGHUNT_RUN_ID: smoke-${{ github.run_id }}-online-${{ matrix.seed }}
        run: |
          set -euo pipefail
          OUT="artifacts/bughunt/$RUN_ID/chess/online"
          mkdir -p "$OUT"
          HOST_LOG="$OUT/host.jsonl"
          CLIENT_LOG="$OUT/client.jsonl"

          flutter pub run tool/network_ai_duel_client.dart \
            --backend-url="$BACKEND_URL" \
            --name="ChessHost-${{ matrix.seed }}" \
            --cooldown-seconds=0 \
            --seed=${{ matrix.seed }} \
            --role=host \
            --run-id="$RUN_ID" \
            --log-file="$HOST_LOG" \
            >"$OUT/host.stdout.log" 2>"$OUT/host.stderr.log" &
          HOST_PID=$!

          READY=0
          for _ in $(seq 1 120); do
            if [ -f "$HOST_LOG" ] && grep -q '"eventType":"session_joined"' "$HOST_LOG"; then
              READY=1
              break
            fi
            sleep 0.5
          done
          if [ "$READY" -ne 1 ]; then
            kill "$HOST_PID" || true
            echo "Host did not emit ready event"
            exit 1
          fi

          flutter pub run tool/network_ai_duel_client.dart \
            --backend-url="$BACKEND_URL" \
            --name="ChessClient-${{ matrix.seed }}" \
            --cooldown-seconds=0 \
            --seed=${{ matrix.seed }} \
            --role=client \
            --run-id="$RUN_ID" \
            --log-file="$CLIENT_LOG" \
            >"$OUT/client.stdout.log" 2>"$OUT/client.stderr.log" &
          CLIENT_PID=$!

          wait "$HOST_PID"
          wait "$CLIENT_PID"

      - name: Gate online logs
        shell: bash
        env:
          RUN_ID: smoke-${{ github.run_id }}-online-${{ matrix.seed }}
        run: |
          set -euo pipefail
          HOST_LOG="artifacts/bughunt/$RUN_ID/chess/online/host.jsonl"
          CLIENT_LOG="artifacts/bughunt/$RUN_ID/chess/online/client.jsonl"
          test -f "$HOST_LOG"
          test -f "$CLIENT_LOG"
          grep -q '"eventType":"session_complete"' "$HOST_LOG"
          grep -q '"eventType":"session_complete"' "$CLIENT_LOG"
          ! grep -q '"eventType":"crash"' "$HOST_LOG"
          ! grep -q '"eventType":"crash"' "$CLIENT_LOG"
          ! grep -q '"eventType":"invariant_failure"' "$HOST_LOG"
          ! grep -q '"eventType":"invariant_failure"' "$CLIENT_LOG"
          ! grep -q 'HOST_CLIENT_DESYNC' "$HOST_LOG"
          ! grep -q 'HOST_CLIENT_DESYNC' "$CLIENT_LOG"

      - name: Emit replay summaries (online smoke)
        if: always()
        shell: bash
        env:
          RUN_ID: smoke-${{ github.run_id }}-online-${{ matrix.seed }}
        run: flutter pub run tool/replay.dart --run-id="$RUN_ID"

      - name: Verify replay artifacts (online smoke)
        if: always()
        shell: bash
        env:
          RUN_ID: smoke-${{ github.run_id }}-online-${{ matrix.seed }}
        run: flutter pub run tool/verify_replay_artifacts.dart --run-id="$RUN_ID" --no-allow-empty

      - name: Upload online smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: chess-online-smoke-${{ matrix.seed }}
          path: artifacts/bughunt/smoke-${{ github.run_id }}-online-${{ matrix.seed }}
          if-no-files-found: warn

  chess-integration-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: false
      - name: Verify shared dependency pin
        run: dart tool/verify_shared_dependency.dart

      - name: Clear checkout GitHub auth header
        shell: bash
        run: |
          git config --local --unset-all http.https://github.com/.extraheader || true
          git config --global --unset-all http.https://github.com/.extraheader || true

      - name: Validate access to shared git dependency
        shell: bash
        env:
          PUREFLUTTER_REPO_TOKEN: ${{ secrets.PUREFLUTTER_REPO_TOKEN }}
        run: |
          set -euo pipefail
          if git ls-remote https://github.com/meshik/pureflutter.git HEAD >/dev/null 2>&1; then
