name: Flutter Side Nightly AI Duels

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:

jobs:
  ai-duel-stress:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: false

      - name: Verify shared dependency pin
        run: dart tool/verify_shared_dependency.dart

      - name: Configure git auth for pub git dependencies
        shell: bash
        env:
          PUREFLUTTER_REPO_TOKEN: ${{ secrets.PUREFLUTTER_REPO_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${PUREFLUTTER_REPO_TOKEN:-}" ]; then
            echo "::error::Missing repository secret PUREFLUTTER_REPO_TOKEN. It must have read access to meshik/pureflutter."
            exit 1
          fi
          git config --global url."https://x-access-token:${PUREFLUTTER_REPO_TOKEN}@github.com/".insteadOf "https://github.com/"

      - name: Verify shared git dependency access
        shell: bash
        run: git ls-remote https://github.com/meshik/pureflutter.git HEAD >/dev/null

      - name: Install dependencies
        run: flutter pub get

      - name: AI-vs-AI stress duel
        run: dart run tool/ai_duel.dart --games=500 --max-plies=260 --seed=20260226 --conversion-fail-cap-adv=5 --max-conversion-failures=14 --log-file=debug/nightly-ai-duel-weird.jsonl --pgn-dir=debug/nightly-ai-duel-weird-pgn

      - name: Print AI duel debug snippet on failure
        if: failure()
        shell: bash
        run: |
          if [ -f debug/nightly-ai-duel-weird.jsonl ]; then
            echo "Recent AI duel weird events:"
            tail -n 80 debug/nightly-ai-duel-weird.jsonl || true
          else
            echo "No AI duel weird log file produced."
          fi
