name: Flutter Side Nightly AI Duels

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:
    inputs:
      games:
        description: "Number of AI-vs-AI games to run"
        required: false
        default: "30"

jobs:
  ai-duel-stress:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: false

      - name: Verify shared dependency pin
        run: dart tool/verify_shared_dependency.dart

      - name: Clear checkout GitHub auth header
        shell: bash
        run: |
          git config --local --unset-all http.https://github.com/.extraheader || true
          git config --global --unset-all http.https://github.com/.extraheader || true

      - name: Validate access to shared git dependency
        shell: bash
        env:
          PUREFLUTTER_REPO_TOKEN: ${{ secrets.PUREFLUTTER_REPO_TOKEN }}
        run: |
          set -euo pipefail
          if git ls-remote https://github.com/gammula/pureflutter.git HEAD >/dev/null 2>&1; then
            echo "Anonymous access to gammula/pureflutter is available."
            exit 0
          fi
          if [ -z "${PUREFLUTTER_REPO_TOKEN:-}" ]; then
            echo "::error::Anonymous git access failed and PUREFLUTTER_REPO_TOKEN is missing."
            echo "::error::Add PUREFLUTTER_REPO_TOKEN with read access to gammula/pureflutter."
            exit 1
          fi
          if ! git ls-remote "https://x-access-token:${PUREFLUTTER_REPO_TOKEN}@github.com/gammula/pureflutter.git" HEAD >/dev/null 2>&1; then
            echo "::error::PUREFLUTTER_REPO_TOKEN cannot read gammula/pureflutter."
            echo "::error::Use a token owned by an account that can open that repo, and ensure org SSO/token approval is completed if required."
            exit 1
          fi
          git config --global url."https://x-access-token:${PUREFLUTTER_REPO_TOKEN}@github.com/".insteadOf "https://github.com/"

      - name: Install dependencies
        run: flutter pub get

      - name: AI-vs-AI stress duel
        shell: bash
        env:
          AI_DUEL_GAMES: ${{ github.event.inputs.games || '30' }}
        run: |
          set -euo pipefail
          # Keep the job timeout higher for infra variance, but fail this step early if it hangs.
          echo "Running AI duel with games=${AI_DUEL_GAMES}, maxPlies=260, watchdog=50m."
          set +e
          timeout --signal=TERM --kill-after=60s 50m \
            flutter pub run tool/ai_duel.dart \
              --games="${AI_DUEL_GAMES}" \
              --max-plies=260 \
              --seed=20260226 \
              --conversion-fail-cap-adv=5 \
              --max-conversion-failures=14 \
              --progress-every=5 \
              --log-file=debug/nightly-ai-duel-weird.jsonl \
              --pgn-dir=debug/nightly-ai-duel-weird-pgn
          duel_rc=$?
          set -e

          if [ "$duel_rc" -eq 124 ] || [ "$duel_rc" -eq 137 ]; then
            echo "::error::AI duel exceeded the 50-minute watchdog timeout (job limit is 60 minutes)."
            echo "::error::Likely causes: hung duel process, dead loop, or workload too large for this lane."
          fi

          exit "$duel_rc"

      - name: Print AI duel debug snippet on failure
        if: failure()
        shell: bash
        run: |
          if [ -f debug/nightly-ai-duel-weird.jsonl ]; then
            echo "Recent AI duel weird events:"
            tail -n 80 debug/nightly-ai-duel-weird.jsonl || true
          else
            echo "No AI duel weird log file produced."
          fi

      - name: Cleanup tokenized Git auth
        if: always()
        shell: bash
        run: |
          keys="$(git config --global --name-only --get-regexp '^url\.https://x-access-token:.*@github\.com/\.insteadof$' || true)"
          if [ -n "$keys" ]; then
            while IFS= read -r key; do
              [ -n "$key" ] && git config --global --unset-all "$key" || true
            done <<< "$keys"
          fi

  notify-discord:
    name: Notify Discord on failure
    runs-on: ubuntu-latest
    env:
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_CI_FAILURE_WEBHOOK }}
    needs: [ai-duel-stress]
    if: >-
      ${{
        always() &&
        needs.ai-duel-stress.result == 'failure'
      }}
    steps:
      - name: Checkout repository for local action
        uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Send Discord failure notification
        if: ${{ env.DISCORD_WEBHOOK_URL != '' }}
        uses: ./.github/actions/notify-discord-failure
        with:
          webhook_url: ${{ env.DISCORD_WEBHOOK_URL }}
          workflow_name: ${{ github.workflow }}
          run_number: ${{ github.run_number }}
          repository: ${{ github.repository }}
          ref_name: ${{ github.ref_name }}
          actor: ${{ github.actor }}
          sha: ${{ github.sha }}
          server_url: ${{ github.server_url }}
          run_id: ${{ github.run_id }}
          event_name: ${{ github.event_name }}
          failed_jobs_json: ${{ toJson(needs) }}
