name: Flutter Side Nightly AI Duels

on:
  schedule:
    # Daily canary lane with tiny workload to preserve fast bug signal at low cost.
    - cron: "0 7 * * *"
  workflow_dispatch:
    inputs:
      run_profile:
        description: "Execution depth (canary keeps spend low; deep is explicit/manual)"
        required: false
        default: canary
        type: choice
        options:
          - canary
          - deep
      games:
        description: "Number of AI-vs-AI games to run"
        required: false
        default: "6"

concurrency:
  # Prevent overlap between scheduled and manual nightly duel runs.
  group: ${{ github.workflow }}-${{ github.ref }}
  # Keep minute usage bounded by replacing stale runs for the same ref.
  cancel-in-progress: true

jobs:
  ai-duel-stress:
    runs-on: ubuntu-latest
    timeout-minutes: 4

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Flutter and shared dependency auth
        uses: ./.github/actions/setup-flutter-shared-dependency
        with:
          pureflutter_repo_token: ${{ secrets.PUREFLUTTER_REPO_TOKEN }}
          flutter_cache: "true"

      - name: AI-vs-AI stress duel
        shell: bash
        env:
          # Scheduled runs are always lightweight.
          AI_DUEL_GAMES: ${{ github.event_name == 'schedule' && '1' || (github.event.inputs.games || '4') }}
          IS_DEEP_PROFILE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.run_profile == 'deep' }}
        run: |
          set -euo pipefail
          if ! [[ "$AI_DUEL_GAMES" =~ ^[0-9]+$ ]]; then
            echo "::error::AI_DUEL_GAMES must be a positive integer. Received: $AI_DUEL_GAMES"
            exit 1
          fi
          watchdog_minutes=3
          max_games=2
          if [ "$IS_DEEP_PROFILE" = "true" ]; then
            # With a strict 4-minute hosted budget, deep profile is advisory only.
            echo "::warning::run_profile=deep requested, but this lane is hard-capped to canary limits (4-minute budget)."
          fi
          # Keep runs bounded even if a very large value is entered.
          if [ "$AI_DUEL_GAMES" -gt "$max_games" ]; then
            echo "::warning::Capping AI_DUEL_GAMES from $AI_DUEL_GAMES to $max_games to protect CI minutes."
            AI_DUEL_GAMES="$max_games"
          fi
          # Keep the job timeout higher for infra variance, but fail this step early if it hangs.
          echo "Running AI duel with games=${AI_DUEL_GAMES}, maxPlies=260, watchdog=${watchdog_minutes}m, deep_profile=${IS_DEEP_PROFILE}."
          set +e
          timeout --signal=TERM --kill-after=30s "${watchdog_minutes}m" \
            flutter pub run tool/ai_duel.dart \
              --games="${AI_DUEL_GAMES}" \
              --max-plies=260 \
              --seed=20260226 \
              --conversion-fail-cap-adv=5 \
              --max-conversion-failures=14 \
              --progress-every=5 \
              --log-file=debug/nightly-ai-duel-weird.jsonl \
              --pgn-dir=debug/nightly-ai-duel-weird-pgn
          duel_rc=$?
          set -e

          if [ "$duel_rc" -eq 124 ] || [ "$duel_rc" -eq 137 ]; then
            echo "::error::AI duel exceeded the ${watchdog_minutes}-minute watchdog timeout (job limit is 4 minutes)."
            echo "::error::Likely causes: hung duel process, dead loop, or workload too large for this lane."
          fi

          exit "$duel_rc"

      - name: Print AI duel debug snippet on failure
        if: failure()
        shell: bash
        run: |
          if [ -f debug/nightly-ai-duel-weird.jsonl ]; then
            echo "Recent AI duel weird events:"
            tail -n 80 debug/nightly-ai-duel-weird.jsonl || true
          else
            echo "No AI duel weird log file produced."
          fi

      - name: Cleanup tokenized Git auth
        if: always()
        uses: ./.github/actions/cleanup-tokenized-git-auth

  notify-discord:
    name: Notify Discord on failure
    runs-on: ubuntu-latest
    env:
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_CI_FAILURE_WEBHOOK }}
    needs: [ai-duel-stress]
    if: >-
      ${{
        always() &&
        needs.ai-duel-stress.result == 'failure'
      }}
    steps:
      - name: Checkout repository for local action
        uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Send Discord failure notification
        if: ${{ env.DISCORD_WEBHOOK_URL != '' }}
        uses: ./.github/actions/notify-discord-failure
        with:
          webhook_url: ${{ env.DISCORD_WEBHOOK_URL }}
          workflow_name: ${{ github.workflow }}
          run_number: ${{ github.run_number }}
          repository: ${{ github.repository }}
          ref_name: ${{ github.ref_name }}
          actor: ${{ github.actor }}
          sha: ${{ github.sha }}
          server_url: ${{ github.server_url }}
          run_id: ${{ github.run_id }}
          event_name: ${{ github.event_name }}
          failed_jobs_json: ${{ toJson(needs) }}
