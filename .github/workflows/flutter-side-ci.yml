name: Flutter Side CI

on:
  push:
    branches:
      - main
      - fixes/**
    paths:
      - "lib/**"
      - "test/**"
      - "tool/**"
      - "pubspec.yaml"
      - "pubspec.lock"
      - "analysis_options.yaml"
      - ".github/workflows/flutter-side-ci.yml"
  pull_request:
    branches:
      - main
    paths:
      - "lib/**"
      - "test/**"
      - "tool/**"
      - "pubspec.yaml"
      - "pubspec.lock"
      - "analysis_options.yaml"
      - ".github/workflows/flutter-side-ci.yml"
  workflow_dispatch:

jobs:
  flutter-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: false

      - name: Verify shared dependency pin
        run: dart tool/verify_shared_dependency.dart

      - name: Clear checkout GitHub auth header
        shell: bash
        run: |
          git config --local --unset-all http.https://github.com/.extraheader || true
          git config --global --unset-all http.https://github.com/.extraheader || true

      - name: Validate access to shared git dependency
        shell: bash
        env:
          PUREFLUTTER_REPO_TOKEN: ${{ secrets.PUREFLUTTER_REPO_TOKEN }}
        run: |
          set -euo pipefail
          if git ls-remote https://github.com/MoniVibe/pureflutter.git HEAD >/dev/null 2>&1; then
            echo "Anonymous access to MoniVibe/pureflutter is available."
            exit 0
          fi
          if [ -z "${PUREFLUTTER_REPO_TOKEN:-}" ]; then
            echo "::error::Anonymous git access failed and PUREFLUTTER_REPO_TOKEN is missing."
            echo "::error::Add PUREFLUTTER_REPO_TOKEN with read access to MoniVibe/pureflutter."
            exit 1
          fi
          if ! git ls-remote "https://x-access-token:${PUREFLUTTER_REPO_TOKEN}@github.com/MoniVibe/pureflutter.git" HEAD >/dev/null 2>&1; then
            echo "::error::PUREFLUTTER_REPO_TOKEN cannot read MoniVibe/pureflutter."
            echo "::error::Use a token owned by an account that can open that repo, and ensure org SSO/token approval is completed if required."
            exit 1
          fi
          git config --global url."https://x-access-token:${PUREFLUTTER_REPO_TOKEN}@github.com/".insteadOf "https://github.com/"

      - name: Install dependencies
        run: flutter pub get
      - name: Cleanup tokenized Git auth
        if: always()
        shell: bash
        run: |
          keys="$(git config --global --name-only --get-regexp '^url\.https://x-access-token:.*@github\.com/\.insteadof$' || true)"
          if [ -n "$keys" ]; then
            while IFS= read -r key; do
              [ -n "$key" ] && git config --global --unset-all "$key" || true
            done <<< "$keys"
          fi

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed lib test tool

      - name: Static analysis
        run: flutter analyze lib test integration_test tool

      - name: Unit and widget tests
        run: flutter test

      - name: AI-vs-AI smoke duel
        id: ai_duel_smoke
        shell: bash
        run: |
          set -euo pipefail
          RUN_ID="ci-chess-smoke-${{ github.run_id }}"
          LOG_ROOT="artifacts/bughunt/$RUN_ID/chess/ai"
          EVENT_LOG="$LOG_ROOT/locala.jsonl"
          WEIRD_LOG="$LOG_ROOT/weird-20260226.jsonl"
          PGN_DIR="$LOG_ROOT/pgn-20260226"
          mkdir -p "$LOG_ROOT" "$PGN_DIR" debug

          set +e
          timeout --signal=TERM --kill-after=30s 15m flutter pub run tool/ai_duel.dart \
            --games=6 \
            --max-plies=240 \
            --seed=20260226 \
            --run-id="$RUN_ID" \
            --conversion-fail-cap-adv=5 \
            --max-conversion-failures=3 \
            --log-file="$WEIRD_LOG" \
            --pgn-dir="$PGN_DIR" \
            >"$LOG_ROOT/ai_duel.stdout.log" 2>"$LOG_ROOT/ai_duel.stderr.log"
          exit_code=$?
          set -e

          reason="success"
          if [ "$exit_code" -eq 124 ] || [ "$exit_code" -eq 137 ]; then
            reason="timeout"
          elif [ "$exit_code" -ne 0 ]; then
            reason="command_failed"
          fi

          sessions=0
          crashes=0
          invariants=0
          conversions=0
          if [ -f "$EVENT_LOG" ]; then
            sessions=$(grep -c '"eventType":"session_joined"' "$EVENT_LOG" || true)
            crashes=$(grep -c '"eventType":"crash"' "$EVENT_LOG" || true)
            invariants=$(grep -c '"eventType":"invariant_failure"' "$EVENT_LOG" || true)
            if [ "$crashes" -gt 0 ]; then
              reason="crash"
            fi
            if [ "$invariants" -gt 0 ]; then
              reason="invariant_failure"
            fi
          fi
          if [ -f "$WEIRD_LOG" ]; then
            conversions=$(grep -c '"type":"conversion_failure"' "$WEIRD_LOG" || true)
            if [ "$conversions" -gt 0 ]; then
              reason="conversion_failures"
            fi
          fi

          if [ ! -s "$EVENT_LOG" ] && [ "$reason" = "success" ]; then
            reason="missing_event_trace"
          elif [ "$sessions" -lt 1 ] && [ "$reason" = "success" ]; then
            reason="missing_session_joined"
          fi

          cat >debug/ci-ai-duel-summary.json <<EOF
          {
            "run_id": "$RUN_ID",
            "reason": "$reason",
            "exit_code": $exit_code,
            "sessions": $sessions,
            "crashes": $crashes,
            "invariant_failures": $invariants,
            "conversion_failures": $conversions,
            "event_log_file": "$EVENT_LOG",
            "weird_log_file": "$WEIRD_LOG"
          }
          EOF

          {
            echo "### chess-ai-duel-smoke"
            echo ""
            echo "- run_id: $RUN_ID"
            echo "- reason: $reason"
            echo "- exit_code: $exit_code"
            echo "- sessions: $sessions"
            echo "- crashes: $crashes"
            echo "- invariant_failures: $invariants"
            echo "- conversion_failures: $conversions"
          } >>"$GITHUB_STEP_SUMMARY"

          if [ "$reason" != "success" ]; then
            echo "::error::AI duel smoke failed: $reason"
            exit 1
          fi

      - name: Replay verification for AI duel artifacts
        if: always()
        env:
          DUEL_OUTCOME: ${{ steps.ai_duel_smoke.outcome }}
        shell: bash
        run: |
          set -euo pipefail
          RUN_ID="ci-chess-smoke-${{ github.run_id }}"
          LOG_ROOT="artifacts/bughunt/$RUN_ID/chess/ai"
          trace_count="$(find "$LOG_ROOT" -maxdepth 1 -type f -name '*.jsonl' -size +0c | wc -l | tr -d ' ')"
          if [ "${trace_count:-0}" -eq 0 ]; then
            if [ "$DUEL_OUTCOME" = "success" ]; then
              echo "::error::No non-empty AI duel traces produced under $LOG_ROOT"
              exit 1
            fi
            echo "::warning::No non-empty AI duel traces to verify (duel outcome: $DUEL_OUTCOME)"
            exit 0
          fi
          flutter pub run tool/replay.dart \
            --run-id="$RUN_ID" \
            --seed=20260226
          flutter pub run tool/verify_replay_artifacts.dart \
            --run-id="$RUN_ID" \
            --no-allow-empty

      - name: Print AI duel debug snippet on failure
        if: failure()
        shell: bash
        run: |
          RUN_ID="ci-chess-smoke-${{ github.run_id }}"
          LOG_ROOT="artifacts/bughunt/$RUN_ID/chess/ai"
          EVENT_LOG="$LOG_ROOT/locala.jsonl"
          WEIRD_LOG="$LOG_ROOT/weird-20260226.jsonl"
          if [ -f "$EVENT_LOG" ]; then
            echo "Recent AI duel event stream entries:"
            tail -n 40 "$EVENT_LOG" || true
          else
            echo "No AI duel event stream file produced."
          fi
          if [ -f "$WEIRD_LOG" ]; then
            echo "Recent AI duel weird events:"
            tail -n 40 "$WEIRD_LOG" || true
          else
            echo "No AI duel weird log file produced."
          fi
          if [ -f "$LOG_ROOT/ai_duel.stderr.log" ]; then
            echo "Recent AI duel stderr:"
            tail -n 40 "$LOG_ROOT/ai_duel.stderr.log" || true
          fi

      - name: Upload AI duel artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: chess-ai-duel-smoke
          path: |
            artifacts/bughunt/ci-chess-smoke-${{ github.run_id }}
            debug/ci-ai-duel-summary.json
          if-no-files-found: warn

  notify-discord:
    name: Notify Discord on failure
    runs-on: ubuntu-latest
    env:
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_CI_FAILURE_WEBHOOK }}
    needs: [flutter-quality]
    if: >-
      ${{
        always() &&
        needs.flutter-quality.result == 'failure'
      }}
    steps:
      - name: Checkout repository for local action
        uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Send Discord failure notification
        if: ${{ env.DISCORD_WEBHOOK_URL != '' }}
        uses: ./.github/actions/notify-discord-failure
        with:
          webhook_url: ${{ env.DISCORD_WEBHOOK_URL }}
          workflow_name: ${{ github.workflow }}
          run_number: ${{ github.run_number }}
          repository: ${{ github.repository }}
          ref_name: ${{ github.ref_name }}
          actor: ${{ github.actor }}
          sha: ${{ github.sha }}
          server_url: ${{ github.server_url }}
          run_id: ${{ github.run_id }}
          event_name: ${{ github.event_name }}
          failed_jobs_json: ${{ toJson(needs) }}
