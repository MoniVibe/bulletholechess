name: Flutter Side CI

on:
  push:
    branches:
      - main
      - fixes/**
    paths:
      - "lib/**"
      - "test/**"
      - "tool/**"
      - "pubspec.yaml"
      - "pubspec.lock"
      - "analysis_options.yaml"
      - ".github/workflows/flutter-side-ci.yml"
  pull_request:
    branches:
      - main
    paths:
      - "lib/**"
      - "test/**"
      - "tool/**"
      - "pubspec.yaml"
      - "pubspec.lock"
      - "analysis_options.yaml"
      - ".github/workflows/flutter-side-ci.yml"
  workflow_dispatch:

jobs:
  flutter-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: false

      - name: Verify shared dependency pin
        run: dart tool/verify_shared_dependency.dart

      - name: Install dependencies
        run: flutter pub get

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed lib test tool

      - name: Static analysis
        run: flutter analyze

      - name: Unit and widget tests
        run: flutter test

      - name: AI-vs-AI smoke duel
        run: dart run tool/ai_duel.dart --games=150 --max-plies=240 --seed=20260226 --conversion-fail-cap-adv=5 --max-conversion-failures=3 --log-file=debug/ci-ai-duel-weird.jsonl --pgn-dir=debug/ci-ai-duel-weird-pgn

      - name: Print AI duel debug snippet on failure
        if: failure()
        shell: bash
        run: |
          if [ -f debug/ci-ai-duel-weird.jsonl ]; then
            echo "Recent AI duel weird events:"
            tail -n 40 debug/ci-ai-duel-weird.jsonl || true
          else
            echo "No AI duel weird log file produced."
          fi
