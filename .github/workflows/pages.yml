name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - "assets/**"
      - "lib/**"
      - "web/**"
      - "pubspec.yaml"
      - "pubspec.lock"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Verify shared dependency pin
        run: dart tool/verify_shared_dependency.dart

      - name: Install dependencies
        run: flutter pub get

      - name: Build Flutter web
        env:
          DEFAULT_BACKEND_URL: ${{ vars.DEFAULT_BACKEND_URL }}
        run: |
          if [ -n "$DEFAULT_BACKEND_URL" ]; then
            flutter build web --release --base-href=/bulletholechess/ --pwa-strategy=none --dart-define=DEFAULT_BACKEND_URL="$DEFAULT_BACKEND_URL"
          else
            flutter build web --release --base-href=/bulletholechess/ --pwa-strategy=none
          fi
          cp web/flutter_service_worker_cleanup.js build/web/flutter_service_worker.js

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
