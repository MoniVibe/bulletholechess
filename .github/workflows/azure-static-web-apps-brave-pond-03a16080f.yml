name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
    paths:
      - "lib/**"
      - "web/**"
      - "pubspec.yaml"
      - "pubspec.lock"
      - ".github/workflows/azure-static-web-apps-brave-pond-03a16080f.yml"
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main
    paths:
      - "lib/**"
      - "web/**"
      - "pubspec.yaml"
      - "pubspec.lock"
      - ".github/workflows/azure-static-web-apps-brave-pond-03a16080f.yml"

concurrency:
  # Cancel stale runs for the same PR/ref to cut redundant build+deploy usage.
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
          lfs: false
          persist-credentials: false
      - name: Setup Flutter and shared dependency auth
        uses: ./.github/actions/setup-flutter-shared-dependency
        with:
          pureflutter_repo_token: ${{ secrets.PUREFLUTTER_REPO_TOKEN }}
          flutter_cache: "false"
      - name: Cleanup tokenized Git auth
        if: always()
        uses: ./.github/actions/cleanup-tokenized-git-auth
      - name: Build Flutter web
        shell: bash
        env:
          DEFAULT_BACKEND_URL: ${{ vars.DEFAULT_BACKEND_URL }}
        run: |
          if [ -n "$DEFAULT_BACKEND_URL" ]; then
            flutter build web --release --dart-define=DEFAULT_BACKEND_URL="$DEFAULT_BACKEND_URL"
          else
            flutter build web --release
          fi
      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_BRAVE_POND_03A16080F }}
          repo_token: ${{ secrets.GITHUB_TOKEN }} # Used for Github integrations (i.e. PR comments)
          action: "upload"
          app_location: "build/web"
          api_location: ""
          output_location: ""
          skip_app_build: true

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_BRAVE_POND_03A16080F }}
          action: "close"

  notify-discord:
    name: Notify Discord on failure
    runs-on: ubuntu-latest
    env:
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_CI_FAILURE_WEBHOOK }}
    needs: [build_and_deploy_job, close_pull_request_job]
    if: >-
      ${{
        always() &&
        (needs.build_and_deploy_job.result == 'failure' || needs.close_pull_request_job.result == 'failure')
      }}
    steps:
      - name: Checkout repository for local action
        uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Send Discord failure notification
        if: ${{ env.DISCORD_WEBHOOK_URL != '' }}
        uses: ./.github/actions/notify-discord-failure
        with:
          webhook_url: ${{ env.DISCORD_WEBHOOK_URL }}
          workflow_name: ${{ github.workflow }}
          run_number: ${{ github.run_number }}
          repository: ${{ github.repository }}
          ref_name: ${{ github.ref_name }}
          actor: ${{ github.actor }}
          sha: ${{ github.sha }}
          server_url: ${{ github.server_url }}
          run_id: ${{ github.run_id }}
          event_name: ${{ github.event_name }}
          failed_jobs_json: ${{ toJson(needs) }}
