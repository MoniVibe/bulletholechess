name: Notify Discord Failure
description: Posts a short GitHub Actions failure summary to a Discord webhook.
inputs:
  webhook_url:
    description: Discord channel webhook URL.
    required: true
  workflow_name:
    description: Workflow name.
    required: true
  run_number:
    description: Workflow run number.
    required: true
  repository:
    description: Repository full name.
    required: true
  ref_name:
    description: Branch or tag name.
    required: false
  actor:
    description: Triggering GitHub actor.
    required: false
  sha:
    description: Triggering commit SHA.
    required: false
  server_url:
    description: GitHub server URL.
    required: true
  run_id:
    description: Workflow run id.
    required: true
  event_name:
    description: Triggering GitHub event.
    required: false
  failed_jobs_json:
    description: JSON object from toJson(needs) for failed job extraction.
    required: false
    default: "{}"
runs:
  using: composite
  steps:
    - name: Post failure message to Discord
      uses: actions/github-script@v7
      env:
        DISCORD_WEBHOOK_URL: ${{ inputs.webhook_url }}
        WORKFLOW_NAME: ${{ inputs.workflow_name }}
        RUN_NUMBER: ${{ inputs.run_number }}
        REPOSITORY: ${{ inputs.repository }}
        SERVER_URL: ${{ inputs.server_url }}
        RUN_ID: ${{ inputs.run_id }}
        FAILED_JOBS_JSON: ${{ inputs.failed_jobs_json }}
      with:
        script: |
          const repoName = (process.env.REPOSITORY.split("/")[1] || process.env.REPOSITORY).trim();
          const runUrl = `${process.env.SERVER_URL}/${process.env.REPOSITORY}/actions/runs/${process.env.RUN_ID}`;

          let failedJobs = [];
          try {
            const needs = JSON.parse(process.env.FAILED_JOBS_JSON || "{}");
            failedJobs = Object.entries(needs)
              .filter(([, value]) => value && value.result === "failure")
              .map(([jobName]) => jobName);
          } catch {
            failedJobs = [];
          }

          const failedJobsText = failedJobs.length > 0
            ? failedJobs.join(", ")
            : "Unknown";

          const content =
            `${repoName} | CI/CD failure in ${process.env.WORKFLOW_NAME} (#${process.env.RUN_NUMBER})\n` +
            `Failed jobs: ${failedJobsText}\n` +
            `Run: ${runUrl}`;

          const response = await fetch(process.env.DISCORD_WEBHOOK_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ content }),
          });

          if (!response.ok) {
            const responseBody = await response.text();
            core.setFailed(`Discord webhook request failed (${response.status}): ${responseBody}`);
          }
